<svg
  width="960"
  height="260"
  viewBox="0 0 960 260"
  fill="none"
  xmlns="http://www.w3.org/2000/svg"
>
  <defs>
    <linearGradient id="wingGold" x1="40" y1="30" x2="260" y2="240" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFD032" />
      <stop offset="1" stop-color="#FFBA00" />
    </linearGradient>
    <clipPath id="pigClip">
      <circle cx="185" cy="140" r="95" />
    </clipPath>
  </defs>

  <!-- Wing / Shield shape -->
  <g transform="translate(16 4)">
    <path
      d="M58 38C90 10 138 2 178 2C218 2 268 18 290 52C316 92 318 142 298 192C278 236 238 262 186 262C126 262 78 236 48 192C18 150 10 98 28 58C34 44 44 34 58 38Z"
      fill="url(#wingGold)"
    />
    <!-- Wing tip extending left -->
    <path
      d="M68 52C48 28 20 18 4 42C-8 60 2 92 22 114C38 130 56 136 68 128C58 108 56 82 68 52Z"
      fill="url(#wingGold)"
    />
    <!-- Wing detail (upper left accent) -->
    <path
      d="M42 60C30 44 14 38 8 50C0 66 10 88 26 102C38 82 42 68 42 60Z"
      fill="#FFE47A"
      opacity="0.6"
    />
  </g>

  <!-- Pig face (white circle) -->
  <g transform="translate(16 4)">
    <circle cx="186" cy="142" r="100" fill="white" stroke="#3D3D3F" stroke-width="14" />

    <!-- Left ear -->
    <ellipse cx="112" cy="68" rx="28" ry="22" fill="white" stroke="#3D3D3F" stroke-width="12" transform="rotate(-20 112 68)" />
    <ellipse cx="112" cy="68" rx="16" ry="12" fill="#FFD0D0" transform="rotate(-20 112 68)" />

    <!-- Right ear -->
    <ellipse cx="260" cy="68" rx="28" ry="22" fill="white" stroke="#3D3D3F" stroke-width="12" transform="rotate(20 260 68)" />
    <ellipse cx="260" cy="68" rx="16" ry="12" fill="#FFD0D0" transform="rotate(20 260 68)" />

    <!-- Eyes -->
    <circle cx="148" cy="130" r="10" fill="#2D2D2F" />
    <circle cx="224" cy="130" r="10" fill="#2D2D2F" />
    <circle cx="152" cy="126" r="3.5" fill="white" />
    <circle cx="228" cy="126" r="3.5" fill="white" />

    <!-- Nose (pink oval) -->
    <ellipse cx="186" cy="168" rx="30" ry="22" fill="#FF6B7A" />
    <circle cx="176" cy="168" r="5.5" fill="#D44B5A" />
    <circle cx="196" cy="168" r="5.5" fill="#D44B5A" />

    <!-- Mouth -->
    <path d="M170 188 Q186 198 202 188" stroke="#3D3D3F" stroke-width="3.5" fill="none" stroke-linecap="round" />
  </g>

  <!-- Chinese text: 飞猪 -->
  <g transform="translate(380 10)">
    <text
      x="0"
      y="148"
      fill="#2D2D2F"
      font-family="'PingFang SC','Hiragino Sans GB','Noto Sans SC','Microsoft YaHei',sans-serif"
      font-size="128"
      font-weight="900"
      font-style="italic"
      letter-spacing="-8"
    >飞猪</text>
  </g>

  <!-- English text: Fliggy -->
  <g transform="translate(386 0)">
    <text
      x="0"
      y="218"
      fill="#2D2D2F"
      font-family="'Avenir Next','PingFang SC','Helvetica Neue',Arial,sans-serif"
      font-size="68"
      font-weight="800"
      font-style="italic"
      letter-spacing="2"
    >Fliggy</text>
  </g>
</svg>
